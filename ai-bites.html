<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Bites — Today's AI, Bite-Sized For Your Role</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-card: #12121a;
    --bg-card-alt: #0f0f18;
    --accent: #6ee7b7;
    --accent-dim: rgba(110, 231, 183, 0.15);
    --accent-glow: rgba(110, 231, 183, 0.3);
    --text-primary: #f0f0f5;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --border: rgba(255,255,255,0.06);
    --role-dev: #3b82f6;
    --role-designer: #a855f7;
    --role-consultant: #f59e0b;
    --role-marketer: #ec4899;
    --role-dev-bg: rgba(59, 130, 246, 0.1);
    --role-designer-bg: rgba(168, 85, 247, 0.1);
    --role-consultant-bg: rgba(245, 158, 11, 0.1);
    --role-marketer-bg: rgba(236, 72, 153, 0.1);
  }

  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* ── Onboarding Overlay ── */
  .onboarding {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg-primary);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .onboarding.hidden {
    opacity: 0; transform: translateY(-30px);
    pointer-events: none;
  }

  .onboarding-logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.5rem;
    letter-spacing: -1px;
  }

  .onboarding-logo span {
    color: var(--text-primary);
  }

  .onboarding-sub {
    color: var(--text-secondary);
    font-size: 0.95rem;
    margin-bottom: 2.5rem;
    text-align: center;
    line-height: 1.5;
    max-width: 280px;
  }

  .onboarding-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .role-buttons {
    display: flex; flex-direction: column;
    gap: 0.75rem; width: 100%; max-width: 320px;
  }

  .role-btn {
    padding: 1rem 1.25rem;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 0.75rem;
    transition: all 0.25s ease;
  }

  .role-btn:active { transform: scale(0.97); }

  .role-btn .role-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .role-btn[data-role="dev"] .role-icon { background: var(--role-dev-bg); }
  .role-btn[data-role="designer"] .role-icon { background: var(--role-designer-bg); }
  .role-btn[data-role="consultant"] .role-icon { background: var(--role-consultant-bg); }
  .role-btn[data-role="marketer"] .role-icon { background: var(--role-marketer-bg); }

  .role-btn[data-role="dev"]:hover, .role-btn[data-role="dev"]:focus {
    border-color: var(--role-dev); box-shadow: 0 0 20px rgba(59,130,246,0.1);
  }
  .role-btn[data-role="designer"]:hover, .role-btn[data-role="designer"]:focus {
    border-color: var(--role-designer); box-shadow: 0 0 20px rgba(168,85,247,0.1);
  }
  .role-btn[data-role="consultant"]:hover, .role-btn[data-role="consultant"]:focus {
    border-color: var(--role-consultant); box-shadow: 0 0 20px rgba(245,158,11,0.1);
  }
  .role-btn[data-role="marketer"]:hover, .role-btn[data-role="marketer"]:focus {
    border-color: var(--role-marketer); box-shadow: 0 0 20px rgba(236,72,153,0.1);
  }

  .role-btn .role-meta {
    display: flex; flex-direction: column;
  }
  .role-btn .role-title { font-weight: 600; }
  .role-btn .role-desc { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }

  /* ── Feed Container ── */
  .feed-container {
    height: 100vh; height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  .feed-scroll {
    height: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Header Bar ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 0.75rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, var(--bg-primary) 60%, transparent);
    pointer-events: none;
  }

  .header > * { pointer-events: auto; }

  .header-logo {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .header-logo span { color: var(--text-primary); }

  .header-date {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .header-role-badge {
    font-size: 0.7rem;
    padding: 0.3rem 0.65rem;
    border-radius: 20px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: 'Outfit', sans-serif;
  }

  .header-role-badge[data-role="dev"] { background: var(--role-dev-bg); color: var(--role-dev); }
  .header-role-badge[data-role="designer"] { background: var(--role-designer-bg); color: var(--role-designer); }
  .header-role-badge[data-role="consultant"] { background: var(--role-consultant-bg); color: var(--role-consultant); }
  .header-role-badge[data-role="marketer"] { background: var(--role-marketer-bg); color: var(--role-marketer); }

  /* ── News Card ── */
  .card {
    height: 100vh; height: 100dvh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    padding: 4.5rem 1.25rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0.4;
    z-index: 0;
    pointer-events: none;
  }

  .card:nth-child(odd)::before {
    background: radial-gradient(ellipse at 20% 20%, rgba(110, 231, 183, 0.06), transparent 60%);
  }
  .card:nth-child(even)::before {
    background: radial-gradient(ellipse at 80% 80%, rgba(59, 130, 246, 0.05), transparent 60%);
  }

  .card-content {
    position: relative; z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .card-image {
    position: absolute;
    top: 0; left: -1.25rem; right: -1.25rem;
    height: 45%;
    overflow: hidden;
    z-index: 0;
  }

  .card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 20%,
      var(--bg-primary) 100%
    );
  }

  .card-text {
    position: relative;
    z-index: 1;
  }

  .card-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 1rem;
  }

  .card-tag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 2s ease infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .card-headline {
    font-size: 1.65rem;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 0.85rem;
    letter-spacing: -0.5px;
  }

  .card-summary {
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--text-secondary);
  }

  .card-source {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 0.75rem;
    font-family: 'Space Mono', monospace;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .card-source-link {
    color: var(--accent);
    text-decoration: none;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
    background: var(--accent-dim);
    transition: background 0.2s;
  }
  .card-source-link:active { background: var(--accent-glow); }

  /* ── Role Impact Section ── */
  .role-impact {
    position: relative; z-index: 1;
    margin-top: auto;
  }

  .role-impact-toggle {
    width: 100%;
    padding: 0.85rem 1rem;
    border-radius: 14px 14px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    background: rgba(255,255,255,0.03);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.2s;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .role-impact-toggle:active { background: rgba(255,255,255,0.06); }

  .role-impact-toggle .toggle-left {
    display: flex; align-items: center; gap: 0.5rem;
  }

  .role-impact-toggle .role-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .role-impact-toggle[data-role="dev"] .role-dot { background: var(--role-dev); }
  .role-impact-toggle[data-role="designer"] .role-dot { background: var(--role-designer); }
  .role-impact-toggle[data-role="consultant"] .role-dot { background: var(--role-consultant); }
  .role-impact-toggle[data-role="marketer"] .role-dot { background: var(--role-marketer); }

  .toggle-arrow {
    transition: transform 0.3s ease;
    color: var(--text-muted);
  }

  .role-impact.open .toggle-arrow { transform: rotate(180deg); }

  .role-impact-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .role-impact.open .role-impact-content {
    max-height: 300px;
  }

  .role-impact-inner {
    padding: 1rem;
  }

  .impact-text {
    font-size: 0.85rem;
    line-height: 1.65;
    color: var(--text-secondary);
  }

  .impact-action {
    margin-top: 0.75rem;
    padding: 0.6rem 0.85rem;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: 600;
    display: flex; align-items: center; gap: 0.4rem;
  }

  .impact-action[data-role="dev"] { background: var(--role-dev-bg); color: var(--role-dev); }
  .impact-action[data-role="designer"] { background: var(--role-designer-bg); color: var(--role-designer); }
  .impact-action[data-role="consultant"] { background: var(--role-consultant-bg); color: var(--role-consultant); }
  .impact-action[data-role="marketer"] { background: var(--role-marketer-bg); color: var(--role-marketer); }

  /* ── Share Button ── */
  .share-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.25rem;
    z-index: 50;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #25D366;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
    transition: transform 0.2s;
  }
  .share-btn:active { transform: scale(0.9); }
  .share-btn svg { width: 24px; height: 24px; fill: white; }

  /* ── End Card ── */
  .end-card {
    height: 100vh; height: 100dvh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .end-card-logo {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .end-card-logo span { color: var(--text-primary); }

  .end-card-msg {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 2rem;
    max-width: 280px;
  }

  .end-share-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.9rem 1.5rem;
    border-radius: 14px;
    background: #25D366;
    color: white;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .end-share-btn:active { transform: scale(0.96); }
  .end-share-btn:hover { box-shadow: 0 0 25px rgba(37, 211, 102, 0.3); }

  .end-sub {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* ── Scroll Indicator ── */
  .scroll-progress {
    position: fixed;
    right: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    z-index: 50;
  }

  .scroll-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: all 0.3s ease;
  }

  .scroll-dot.active {
    background: var(--accent);
    height: 18px;
    border-radius: 3px;
  }

  /* ── Bottom Hint ── */
  .scroll-hint {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    animation: bounce-hint 2s ease infinite;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .scroll-hint.hidden { opacity: 0; }

  .scroll-hint-text {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  @keyframes bounce-hint {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-6px); }
  }

  .chevron-down {
    width: 16px; height: 16px;
    color: var(--text-muted);
  }

  /* ── CTA Footer on last card ── */
  .cta-footer {
    text-align: center;
    padding: 1.5rem;
    position: relative; z-index: 1;
  }

  .cta-footer p {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.85rem 1.5rem;
    border-radius: 12px;
    background: var(--accent);
    color: var(--bg-primary);
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .cta-btn:active {
    transform: scale(0.96);
  }

  .cta-btn:hover {
    box-shadow: 0 0 30px var(--accent-glow);
  }

  /* ── Counter Badge ── */
  .card-counter {
    position: absolute;
    top: 4.2rem;
    right: 1.25rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    z-index: 2;
  }

  /* ── Desktop cap ── */
  @media (min-width: 480px) {
    .feed-container {
      max-width: 430px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .header {
      max-width: 430px;
      left: 50%;
      transform: translateX(-50%);
    }
    .scroll-progress {
      right: calc(50% - 215px + 10px);
    }
  }

  /* ── Small phones (SE, older Androids) ── */
  @media (max-height: 700px) {
    .card {
      padding: 4rem 1rem 1.25rem;
    }
    .card-image {
      height: 35%;
      left: -1rem; right: -1rem;
    }
    .card-headline {
      font-size: 1.35rem;
      margin-bottom: 0.5rem;
    }
    .card-summary {
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .card-tag {
      margin-bottom: 0.6rem;
    }
    .card-source {
      margin-top: 0.5rem;
    }
    .role-impact-toggle {
      padding: 0.7rem 0.85rem;
      font-size: 0.8rem;
    }
    .role-impact-inner {
      padding: 0.75rem;
    }
    .impact-text {
      font-size: 0.8rem;
      line-height: 1.5;
    }
    .impact-action {
      font-size: 0.72rem;
      padding: 0.5rem 0.7rem;
    }
    .role-impact.open .role-impact-content {
      max-height: 250px;
    }
  }

  /* ── Very small phones (320px width) ── */
  @media (max-width: 360px) {
    .card-headline {
      font-size: 1.3rem;
    }
    .card-summary {
      font-size: 0.82rem;
    }
    .onboarding-logo {
      font-size: 1.5rem;
    }
    .role-btn {
      padding: 0.8rem 1rem;
    }
  }

  /* ── Tall phones (notch/dynamic island safe area) ── */
  @supports (padding-top: env(safe-area-inset-top)) {
    .header {
      padding-top: calc(0.75rem + env(safe-area-inset-top));
    }
    .card:first-child {
      padding-top: calc(4.5rem + env(safe-area-inset-top));
    }
    .share-btn {
      bottom: calc(1.5rem + env(safe-area-inset-bottom));
    }
    .scroll-hint {
      bottom: calc(1.5rem + env(safe-area-inset-bottom));
    }
  }
</style>
</head>
<body>

<!-- Onboarding -->
<div class="onboarding" id="onboarding">
  <div class="onboarding-logo">AI<span>Bites</span></div>
  <p class="onboarding-sub">Today's AI news, bite-sized for your role. 30 seconds per story. Zero fluff.</p>
  <p class="onboarding-label">I work as a</p>
  <div class="role-buttons">
    <button class="role-btn" data-role="dev" onclick="selectRole('dev')">
      <div class="role-icon">⌨️</div>
      <div class="role-meta">
        <span class="role-title">Developer</span>
        <span class="role-desc">Code, architecture, shipping</span>
      </div>
    </button>
    <button class="role-btn" data-role="designer" onclick="selectRole('designer')">
      <div class="role-icon">🎨</div>
      <div class="role-meta">
        <span class="role-title">Product Designer</span>
        <span class="role-desc">UX, interfaces, user research</span>
      </div>
    </button>
    <button class="role-btn" data-role="consultant" onclick="selectRole('consultant')">
      <div class="role-icon">💼</div>
      <div class="role-meta">
        <span class="role-title">Consultant</span>
        <span class="role-desc">Strategy, clients, problem-solving</span>
      </div>
    </button>
    <button class="role-btn" data-role="marketer" onclick="selectRole('marketer')">
      <div class="role-icon">📣</div>
      <div class="role-meta">
        <span class="role-title">Marketer</span>
        <span class="role-desc">Growth, content, campaigns</span>
      </div>
    </button>
  </div>
</div>

<!-- Header -->
<div class="header" id="header" style="display:none;">
  <div>
    <div class="header-logo">AI<span>Bites</span></div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <button class="header-role-badge" id="roleBadge" onclick="changeRole()"></button>
</div>

<!-- Scroll Progress -->
<div class="scroll-progress" id="scrollProgress" style="display:none;"></div>

<!-- Scroll Hint -->
<div class="scroll-hint" id="scrollHint" style="display:none;">
  <span class="scroll-hint-text">Swipe up</span>
  <svg class="chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
</div>

<!-- Feed -->
<div class="feed-container" style="display:none;" id="feedContainer">
  <div class="feed-scroll" id="feedScroll"></div>
</div>

<!-- WhatsApp Share FAB -->
<button class="share-btn" id="shareBtn" onclick="shareWhatsApp()">

let currentRole = null;
let currentCard = 0;

function selectRole(role) {
  currentRole = role;
  const onboarding = document.getElementById('onboarding');
  onboarding.classList.add('hidden');

  setTimeout(() => {
    onboarding.style.display = 'none';
    document.getElementById('header').style.display = 'flex';
    document.getElementById('feedContainer').style.display = 'block';
    document.getElementById('scrollProgress').style.display = 'flex';
    document.getElementById('scrollHint').style.display = 'flex';
    setDate();
    updateRoleBadge();
    renderFeed();
    initScrollTracking();
  }, 400);
}

function changeRole() {
  const roles = ['dev', 'designer', 'consultant', 'marketer'];
  const idx = roles.indexOf(currentRole);
  currentRole = roles[(idx + 1) % roles.length];
  updateRoleBadge();
  renderFeed();
  // Maintain scroll position
  const scroll = document.getElementById('feedScroll');
  const cardH = scroll.children[0]?.offsetHeight || window.innerHeight;
  scroll.scrollTo(0, currentCard * cardH);
}

function updateRoleBadge() {
  const badge = document.getElementById('roleBadge');
  const labels = { dev: 'DEV', designer: 'DESIGN', consultant: 'CONSULT', marketer: 'MKT' };
  badge.textContent = labels[currentRole];
  badge.setAttribute('data-role', currentRole);
}

function setDate() {
  const d = new Date();
  const opts = { weekday: 'long', month: 'short', day: 'numeric' };
  document.getElementById('headerDate').textContent = d.toLocaleDateString('en-IN', opts);
}

function renderFeed() {
  const feed = document.getElementById('feedScroll');
  feed.innerHTML = '';

  NEWS_DATA.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <span class="card-counter">${i+1}/${NEWS_DATA.length}</span>
      <div class="card-content">
        ${item.image ? `<div class="card-image"><img src="${item.image}" alt="" loading="lazy"></div>` : ''}
        <div class="card-text">
          <div class="card-tag">
            <span class="card-tag-dot"></span>
            ${item.tag}
          </div>
          <h1 class="card-headline">${item.headline}</h1>
          <p class="card-summary">${item.summary}</p>
          <p class="card-source">
            ${item.source}
            <a href="${item.url}" target="_blank" rel="noopener" class="card-source-link">Read ↗</a>
          </p>
        </div>
      </div>
      <div class="role-impact" id="impact-${i}">
        <button class="role-impact-toggle" data-role="${currentRole}" onclick="toggleImpact(${i})">
          <span class="toggle-left">
            <span class="role-dot"></span>

          <span class="toggle-arrow">▾</span>
        </button>

          <div class="role-impact-inner">
            <p class="impact-text">${item.impact[currentRole].text}</p>
            <div class="impact-action" data-role="${currentRole}">

            </div>
          </div>
        </div>
      </div>
    `;

  prog.innerHTML = NEWS_DATA.map((_, i) =>

  ).join('');

function toggleImpact(idx) {
  const el = document.getElementById(`impact-${idx}`);
  el.classList.toggle('open');
}

function initScrollTracking() {
  const scroll = document.getElementById('feedScroll');
  const hint = document.getElementById('scrollHint');
  let hintHidden = false;

  scroll.addEventListener('scroll', () => {
    if (!hintHidden) {
      hint.classList.add('hidden');
      hintHidden = true;
    }

    const cardH = scroll.children[0]?.offsetHeight || window.innerHeight;
    const newCard = Math.round(scroll.scrollTop / cardH);

    if (newCard !== currentCard) {
      currentCard = newCard;
      document.querySelectorAll('.scroll-dot').forEach((d, i) => {
        d.classList.toggle('active', i === currentCard);
      });
    }
  });
}

function shareWhatsApp() {
  const url = window.location.href;
  const text = `AI Bites — today's AI news, bite-sized for your role. Takes 2 mins. Check it out 👇\n${url}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}
